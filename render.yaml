services:
  - type: web
    name: erp-ocr-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OCR_SPACE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
